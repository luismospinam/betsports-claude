# ============================================================
# SportBets — application configuration
# ============================================================

spring:
  application:
    name: sport-bets

  config:
    import: "optional:classpath:application-local.yml"

  # No HTTP server — this is a background service only
  main:
    web-application-type: none

  # docker run --name sportbets -e POSTGRES_PASSWORD=pass1234567 -d -p 5432:5432 -v C:\Users\lmosp\OneDrive\Documents\projects\SportBets\db:/var/lib/postgresql/data  postgres -c log_statement=all
  # docker run --name sportbets -e POSTGRES_PASSWORD=pass1234567 -d -p 5432:5432 -v /Users/luismiguelospina/Documents/projects/betsports-claude/db:/var/lib/postgresql/data postgres -c log_statement=all
  datasource:
    url: jdbc:postgresql://localhost:5432/sportbets
    username: postgres
    password: "REPLACE_WITH_DB_PASSWORD"  # override in application-local.yml
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate         # Flyway handles schema; Hibernate just validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ============================================================
# Betplay API settings
# ⚠️  Fill these in after running the discovery tool:
#     ./gradlew bootRun --args="--spring.profiles.active=discover"
# ============================================================
betplay:
  api:
    base-url: https://na-offering-api.kambicdn.net
    events-path: /offering/v2018/betplay/listView/football/all/all/all/matches.json?lang=es_CO&market=CO&client_id=2&channel_id=1&useCombined=true
    odds-path: /offering/v2018/betplay/betoffer/event/{eventId}.json?lang=es_CO&market=CO&client_id=2&channel_id=1&includeParticipants=true
    live-path: /offering/v2018/betplay/listView/football/all/all/all/in-play.json?lang=es_CO&market=CO&client_id=2&channel_id=1

  monitor:
    # Minimum odds rise (%) to trigger — filters out noise
    # 40% threshold: +42.6% EV (vs +32.8% at 30%), 68 qualifying bets vs 82 — better quality
    odds-rise-threshold-pct: 40.0
    # Maximum odds rise (%) allowed — above this suggests collapse (red card, 2+ goals, injury)
    odds-rise-max-pct: 100.0
    # Maximum alerts per match (spam guard)
    max-alerts-per-match: 1
    # Only bet within this minute window
    min-match-minute: 1
    max-match-minute: 80
    # Only target genuine pre-match favorites (odds ≤ this value)
    # 1.55 ceiling: 72 bets at 57.7% win rate (+20.1% EV) vs 62 bets at 54.1% (+10% EV) at 1.50
    max-baseline-odds: 1.55
    # Don't bet if market has given up (current odds above this)
    # Raised to 3.00: 2.50–2.99 DC is near break-even; ≥3.00 outright is +25% EV (5 bets)
    max-current-odds: 3.00
    # Path A DC market window: use Doble Oportunidad only within [min, max) odds range.
    #   Below min  → RESULTADO_FINAL (rare — team still strong favorite)
    #   [min, max) → DOBLE_OPORTUNIDAD (DC always beats outright win rate across all bands)
    #   max+       → RESULTADO_FINAL (≥3.00 outright has +25% EV; DC also positive but lower)
    # DC consistently wins vs outright in every band 1.50–2.99; outright only wins above 3.00
    double-chance-min-odds: 1.50
    double-chance-max-odds: 3.00

    halftime:
      # TIED_HALFTIME disabled — EV is -28% at every threshold tested (46.5% win rate,
      # needs 50.5% to break even at avg 1.98 odds). No sub-segment has positive EV.
      enabled: false
      min-minute: 10
      max-minute: 43
      odds-rise-threshold-pct: 20.0
      max-current-odds: 2.50

  credentials:
    username: "REPLACE_WITH_BETPLAY_USERNAME"  # override in application-local.yml
    password: "REPLACE_WITH_BETPLAY_PASSWORD"  # override in application-local.yml

  betting:
    # Set to true to enable automatic bet placement (dry-run mode by default)
    enabled: true
    # Stake per bet in Colombian pesos (minimum 550)
    stake-cop: 1000
    # CDP remote debugging port — connects to your already-running Chrome.
    # One-time setup: run ./start-chrome.sh — credentials are filled automatically on login check.
    cdp-port: 9222
    # Cancel bet if betslip odds differ from trigger odds by more than this % (situation changed during suspension)
    max-odds-deviation-pct: 15.0

  scheduler:
    # Sync upcoming matches from Betplay (every 4 hours = 14400000 ms)
    match-sync-ms: 14400000
    # Check if any matches have gone LIVE (every 60 seconds)
    live-sync-ms: 60000
    # Capture pre-match baseline odds (every 5 minutes = 300000 ms)
    pre-match-odds-ms: 300000
    # Poll live match odds (every 45 seconds)
    live-odds-ms: 45000
    # Drain Discord alert queue (every 30 seconds)
    discord-send-ms: 30000

  basketball:
    api:
      events-path: /offering/v2018/betplay/listView/basketball/all/all/all/matches.json?lang=es_CO&market=CO&client_id=2&channel_id=1&useCombined=true
      live-path: /offering/v2018/betplay/listView/basketball/all/all/all/in-play.json?lang=es_CO&market=CO&client_id=2&channel_id=1

    monitor:
      # Minimum odds rise (%) to trigger — basketball odds are more volatile, 30% filters noise
      odds-rise-threshold-pct: 20.0
      # Above this = collapse (injury, blowout in progress) — skip
      odds-rise-max-pct: 100.0
      # Max alerts per match
      max-alerts-per-match: 1
      # Only target genuine pre-match favorites (moneyline ≤ this)
      max-baseline-odds: 1.50
      # Don't bet if market has given up
      max-current-odds: 3.00
      # Favorite must be losing by at least this many points
      min-point-deficit: 0
      # Favorite losing by more than this = likely unrecoverable, skip
      max-point-deficit: 10
      # Periods in which we allow betting (comma-separated Kambi periodId values)
      # HALFTIME = between Q2 and Q3 (best — max uncertainty, full half remaining)
      # QUARTER3 = 3rd quarter in progress
      # QUARTER4 = 4th quarter (still time to recover, but riskier)
      bet-periods: "QUARTER2,HALFTIME,QUARTER3"

    scheduler:
      match-sync-ms: 14400000
      live-sync-ms: 60000
      pre-match-odds-ms: 300000
      live-odds-ms: 45000

# ============================================================
# Discord webhook
# How to get your webhook URL:
#   1. Open Discord → your server → channel settings
#   2. Integrations → Webhooks → Create Webhook
#   3. Copy Webhook URL and paste it below
# ============================================================
discord:
  webhook:
    enabled: true
    url: "REPLACE_WITH_WEBHOOK_URL"  # override in application-local.yml
  bot:
    token: "REPLACE_WITH_BOT_TOKEN"   # override in application-local.yml
    channel-id: "REPLACE_WITH_CHANNEL_ID"
    mention-id: "REPLACE_WITH_MENTION_ID"

# ============================================================
# Logging
# ============================================================
logging:
  level:
    com.sportbets: INFO
    org.springframework: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{HH:mm:ss} [%-5level] %logger{36} - %msg%n"

